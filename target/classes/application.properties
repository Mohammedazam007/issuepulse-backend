# =============================================
# IssuePulse - Application Configuration
# =============================================

server.port=8080

# =============================================
# MySQL Database
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/issuepulse_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT Configuration
# =============================================
# Change this secret in production (min 256-bit / 32 chars)
app.jwt.secret=IssuePulseSecretKey2024@CampusComplaintSystem#Secure!
app.jwt.expiration-ms=86400000

# =============================================
# File Upload
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
file.upload-dir=uploads

# =============================================
# Student email domain validation
# =============================================
app.student.email-domain=@anurag.edu.in

# =============================================
# CORS
# =============================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# =============================================
# Logging
# =============================================
logging.level.com.issuepulse=DEBUG
